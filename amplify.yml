version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20 || true
        - npm ci --no-audit --no-fund
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - ~/.npm/**/*
